<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi | Ceren Yılan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>

<body>

    <div class="sayfa">

        <a href="/index.html" class="geri-linki">← Portföye Dön</a>
        <!-- "/index.html" -> başındaki "/" işareti, "sitenin KÖKÜNDEN
             başla" demek. Böylece hangi klasörde olursak olalım
             (todo-list'in içinde bile), her zaman doğru şekilde ana
             sayfaya gider. -->

        <header>
            <p class="eyebrow">PROJE — JAVASCRIPT TEMELLERİ</p>
            <h1>Yapılacaklar Listesi</h1>
            <p class="aciklama">Diziler, DOM manipülasyonu ve olay dinleyicileri kullanarak yaptığım basit bir to-do list uygulaması.</p>
        </header>

        <main>
            <!-- ===== GÖREV EKLEME ALANI ===== -->
            <div class="ekleme-alani">
                <input type="text" id="gorev-input" placeholder="Yeni bir görev yaz..." maxlength="80">
                <button id="ekle-butonu">Ekle</button>
            </div>

            <!-- ===== GÖREV LİSTESİ ===== -->
            <!-- Bu liste BOŞ - JavaScript, kullanıcı görev ekledikçe
                 buraya <li> etiketlerini KENDİSİ oluşturup ekleyecek.
                 Buna "dinamik DOM oluşturma" denir. -->
            <ul id="gorev-listesi"></ul>

            <!-- ===== BOŞ DURUM MESAJI ===== -->
            <p id="bos-mesaji" class="bos-mesaji">Henüz görev yok. Yukarıdan bir tane ekle!</p>
        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
